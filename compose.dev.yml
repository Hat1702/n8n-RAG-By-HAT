services:
  n8n:
    environment:
      N8N_HOST: localhost
      N8N_PROTOCOL: http
      N8N_SECURE_COOKIE: "false"
      N8N_PROXY_HOPS: 1
      WEBHOOK_URL: http://localhost:${CADDY_HTTP_PORT:-8080}/
      N8N_EDITOR_BASE_URL: http://localhost:${N8N_PORT:-5678}/
    ports:
      - "127.0.0.1:${N8N_PORT:-5678}:5678"

  minio:
    ports:
      - "127.0.0.1:${MINIO_API_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"

  qdrant:
    ports:
      - "127.0.0.1:${QDRANT_HTTP_PORT:-6333}:6333"

  ollama:
    ports:
      - "127.0.0.1:${OLLAMA_PORT:-11434}:11434"

  docling:
    ports:
      - "127.0.0.1:${DOCLING_PORT:-5001}:5001"

  caddy:
    ports:
      - "127.0.0.1:${CADDY_HTTP_PORT:-8080}:80"

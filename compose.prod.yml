services:
  n8n:
    environment:
      N8N_HOST: ${N8N_DOMAIN}
      N8N_PROTOCOL: https
      N8N_SECURE_COOKIE: "true"
      N8N_PROXY_HOPS: 1
      WEBHOOK_URL: https://${APP_DOMAIN}/
      N8N_EDITOR_BASE_URL: https://${N8N_DOMAIN}/

  caddy:
    volumes:
      - ./infra/caddy/Caddyfile.prod:/etc/caddy/Caddyfile:ro
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
